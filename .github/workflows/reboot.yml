name: 🔄 Voltrex Auto-Reboot & Cache Purge

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  reboot:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🧹 Force System Refresh
        run: |
          git config --global user.name "Voltrex-Bot"
          git config --global user.email "bot@voltrex.io"
          
          # This creates a physical change that Streamlit MUST react to
          echo "Last System Wipe: $(date)" > reboot_trigger.txt
          
          git add reboot_trigger.txt
          git commit -m "🔄 Scheduled System Wipe: $(date)"
          git push
